name: Bazel CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Bazel keeps build outputs under ~/.cache/bazel and bazelisk caches
      # downloaded Bazel binaries under ~/.cache/bazelisk. Keying on the
      # things that actually change the build graph -- MODULE.bazel,
      # .bazelversion, and the Starlark in tools/bazel -- gets near-full
      # cache hits on unrelated source changes.
      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'tools/bazel/**') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Build everything
        run: bazel build //...

      - name: Test everything
        run: bazel test //... --test_output=errors

      # Spot-check that the assembled deployables still produce. These have
      # passed all along via //... but exercising them explicitly makes a
      # regression in the WAR/distribution/CLI obvious from the CI log.
      - name: Verify deployables
        run: |
          bazel build \
            //archiva-cli:archiva-cli \
            //archiva-modules/archiva-web/archiva-webapp:archiva \
            //archiva-jetty:archiva-jetty-dist \
            //archiva-docs:archiva-docs-sources
          ls -lh \
            bazel-bin/archiva-cli/archiva-cli.jar \
            bazel-bin/archiva-modules/archiva-web/archiva-webapp/archiva.war \
            bazel-bin/archiva-jetty/archiva-jetty-dist.tar.gz \
            bazel-bin/archiva-docs/archiva-docs-sources.tar.gz
